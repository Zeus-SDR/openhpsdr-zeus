name: Test linux-arm64 tarball build

# Temporary workflow to validate the linux-arm64 cross-publish + packaging
# added in feat/raspberry-pi-arm64. Delete this file before merging.
#
# Triggers: push to feat/raspberry-pi-arm64, or manual dispatch.

on:
  push:
    branches:
      - feat/raspberry-pi-arm64
  workflow_dispatch:

jobs:
  build-linux-arm64:
    name: Cross-publish linux-arm64 tarball
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Verify committed libwdsp.so arm64
        run: |
          ls -lh Zeus.Dsp/runtimes/linux-arm64/native/
          file Zeus.Dsp/runtimes/linux-arm64/native/libwdsp.so

      - name: Install aarch64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu cmake build-essential

      - name: Cross-compile libminiaudio for arm64
        run: |
          cmake -S native/miniaudio -B native/build-miniaudio-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64
          cmake --build native/build-miniaudio-arm64 --config Release --parallel
          file native/build-miniaudio-arm64/libminiaudio.so
          cp native/build-miniaudio-arm64/libminiaudio.so \
             Zeus.Dsp/runtimes/linux-arm64/native/libminiaudio.so

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zeus-web/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: zeus-web

      - name: Publish OpenhpsdrZeus for linux-arm64
        run: |
          dotnet publish OpenhpsdrZeus/OpenhpsdrZeus.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained true \
            -p:PublishReadyToRun=true \
            -p:DebugType=embedded \
            -p:DebugSymbols=false

      - name: Build tarball
        run: |
          chmod +x installers/create-linux-package.sh
          installers/create-linux-package.sh 0.0.0-test linux-arm64

      - name: Build AppImages (cross-built aarch64 via ARCH=aarch64)
        run: |
          chmod +x installers/create-linux-desktop-appimage.sh
          installers/create-linux-desktop-appimage.sh 0.0.0-test linux-arm64

      - name: Verify artifacts
        run: |
          ls -lh installers/output/
          tar -tzf installers/output/openhpsdr-zeus-0.0.0-test-linux-arm64.tar.gz | head -20
          file installers/output/OpenhpsdrZeus*aarch64*.AppImage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zeus-linux-arm64-test
          path: |
            installers/output/openhpsdr-zeus-0.0.0-test-linux-arm64.tar.gz
            installers/output/OpenhpsdrZeus*-0.0.0-test-linux-aarch64.AppImage
          if-no-files-found: error
